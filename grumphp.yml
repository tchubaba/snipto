grumphp:
  hooks_dir: ~
  hooks_preset: local
  fixer: false
  git_hook_variables:
    VAGRANT_HOST_DIR: .
    VAGRANT_PROJECT_DIR: /var/www/html
    EXEC_GRUMPHP_COMMAND: docker compose exec -T app
  tasks:
    phpcsfixer:
      config: .php-cs-fixer.php
      triggered_by: [php]
    phpunit:
      config_file: phpunit.xml
      testsuite: ~
      group: []
      always_execute: true
    shell:
      scripts:
        - ['-c', 'composer audit --no-interaction']
        - ['-c', 'npm audit --audit-level=moderate']
      triggered_by: [json, lock]
  testsuites: []
  extensions: []
