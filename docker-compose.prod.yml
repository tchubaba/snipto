services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile-fpm
      args:
        user: snipto
        uid: 1000
    image: snipto/app-prod
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      APP_ENV: '${APP_ENV:-production}'
      APP_PORT: '${APP_PORT:-8080}'
      DB_CONNECTION: '${DB_CONNECTION:-mysql}'
      DB_HOST: '${DB_HOST:-mariadb}'
      DB_PORT: '${DB_PORT:-3306}'
      DB_DATABASE: '${DB_DATABASE:-snipto}'
      DB_USERNAME: '${DB_USERNAME:-snipto}'
      DB_PASSWORD: '${DB_PASSWORD:-secret}'
    volumes:
      - '.:/var/www/html'
      - 'snipto-data:/data'
    networks:
      - sail

  nginx:
    image: crowdsecurity/openresty:latest
    container_name: snipto-nginx-1
    ports:
      # Bind strictly to 443 for production HTTPS
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_DIR:-/tmp/nonexistent}:/etc/nginx/ssl:ro
      # Mount the Cloudflare whitelist (auto-generated by generate-cloudflare-nginx-config.sh)
      - ./docker/cloudflare.conf:/etc/nginx/conf.d/cloudflare.conf:ro
      # Mount the CrowdSec bouncer configuration file generated by crowdsec-setup.sh
      - ./docker/crowdsec/crowdsec-openresty-bouncer.conf:/etc/crowdsec/bouncers/crowdsec-openresty-bouncer.conf:ro
      # Serve static assets and index.php from Laravel's public directory
      - ./public:/var/www/html/public:ro
      # Shared log dir — nginx writes here, crowdsec reads it
      - snipto-nginx-logs:/var/log/nginx
    depends_on:
      - app
      - crowdsec
    networks:
      - sail

  mariadb:
    image: 'mariadb:11'
    profiles: ["with-db"]
    ports:
      # Secured: Bound strictly to host localhost. Public internet blocked.
      - '127.0.0.1:${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-secret}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE:-snipto}'
      MYSQL_USER: '${DB_USERNAME:-snipto}'
      MYSQL_PASSWORD: '${DB_PASSWORD:-secret}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - 'sail-mariadb:/var/lib/mysql'
    networks:
      - sail
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # CrowdSec agent — parses nginx logs, detects attacks, creates ban decisions
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: snipto-crowdsec-1
    environment:
      COLLECTIONS: "crowdsecurity/nginx crowdsecurity/http-cve crowdsecurity/base-http-scenarios crowdsecurity/whitelist-good-actors"
      GID: "${GID:-1000}"
    volumes:
      - ./docker/crowdsec/acquis.yaml:/etc/crowdsec/acquis.d/nginx.yaml:ro            # custom log ingestion (nginx access log)
      - snipto-nginx-logs:/var/log/nginx:ro                                   # read nginx logs
      - crowdsec-db:/var/lib/crowdsec/data/                                   # persistent decisions DB
    ports:
      - "127.0.0.1:8080:8080"                                                 # LAPI (localhost only!)
    networks:
      - sail                                                                  # same network as nginx/app

networks:
  sail:
    driver: bridge

volumes:
  sail-mariadb:
    driver: local
  snipto-data:
    driver: local
  crowdsec-db:
    driver: local
  snipto-nginx-logs:
    driver: local
