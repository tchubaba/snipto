version: 2
updates:
  # Monitor GitHub Actions for updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Monitor Composer (PHP) dependencies
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"

  # Monitor Docker dependencies (base images, etc.)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
